<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sign in — Aldea</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/assets/styles.css" />
<link rel="icon" href="/assets/img/logo/aldea-logo.svg" type="image/svg+xml" />
</head>
<body>
<header>
  <nav class="nav">
    <div class="container nav-row">
      <a class="brand" href="/"><img class="brand-logo" src="/assets/img/logo/aldea-logo.svg" alt="" /><span><span class="brand-wordmark">Aldea</span><span class="brand-sub">Connect Directory</span></span></a>
      <div class="nav-links"></div>
      <div class="nav-cta"><a class="signin" href="/">← Back to home</a></div>
    </div>
  </nav>
</header>

<main style="padding:64px 0;background:var(--cream);min-height:calc(100vh - 78px)">
  <div class="container" style="max-width:440px">
    <div class="card">
      <h1 style="font-size:28px;margin:0 0 6px;text-align:center;text-transform:none">Welcome back</h1>
      <p style="text-align:center;color:var(--ink-3)">Sign in to your Aldea account.</p>
      <form class="form" id="intake-form" novalidate style="margin-top:8px">
        <label>Email<input type="email" name="email" required autocomplete="email" /></label>
        <label>Password<input type="password" name="password" required autocomplete="current-password" /></label>
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:13.5px;color:var(--ink-3)">
          <label style="flex-direction:row;align-items:center;gap:6px;text-transform:none;letter-spacing:0;font-weight:600;color:var(--ink-2)"><input type="checkbox" style="accent-color:var(--ink)" /> Remember me</label>
          <a href="#" style="font-weight:700">Forgot password?</a>
        </div>
        <button class="btn btn-yellow btn-lg" type="submit">Sign in</button>
        <div class="form-success" hidden role="status"><strong>Signed in (demo).</strong> Wire up Supabase or Auth.js to make this real.</div>
      </form>
      <p style="text-align:center;font-size:14px;margin-top:18px;color:var(--ink-3)">Don&rsquo;t have an account? <a href="/#match" style="font-weight:700">Get matched →</a></p>
    </div>
  </div>
</main>
<script src="/assets/app.js" defer></script>
</body></html>
